<script>
/* Sidebar toggle */
        const sidebar = document.getElementById('sidebar');
const content = document.getElementById('content');

const menuBtn = document.getElementById('menuBtn');

function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const menuBtn = document.getElementById('menuBtn');

    sidebar.classList.toggle('open');
    menuBtn.classList.toggle('shift');
}

function navigateTo(page){
    window.location.href = page;
}

const photoInput = document.getElementById('photoInput');
const profilePhoto = document.getElementById('profilePhoto');

const cropModal = document.getElementById('cropModal');
const cropImage = document.getElementById('cropImage');

let isProcessing = false;


// open file picker when avatar clicked
profilePhoto.addEventListener('click', () => {
    if (isProcessing) return;
    photoInput.click();
});


// AUTO PROCESS IMAGE (no save button)
photoInput.addEventListener('change', (e) => {

    const file = e.target.files[0];
    if (!file || isProcessing) return;

    isProcessing = true;

    const reader = new FileReader();

    reader.onload = function(event) {

        const rawImage = event.target.result;

        const img = new Image();
        img.src = rawImage;

        img.onload = function() {

            const canvas = document.createElement('canvas');
            const size = Math.min(img.width, img.height);

            canvas.width = size;
            canvas.height = size;

            const ctx = canvas.getContext('2d');

            ctx.drawImage(
                img,
                (img.width - size) / 2,
                (img.height - size) / 2,
                size,
                size,
                0,
                0,
                size,
                size
            );

            const finalImage = canvas.toDataURL('image/png');

            // update avatar instantly
            profilePhoto.src = finalImage;

            // save permanently
            localStorage.setItem('profilePhoto', finalImage);

            // close modal
            cropModal.classList.add('hidden');

            // reset input to prevent re-trigger bugs
            photoInput.value = '';

            // unlock system shortly after
            setTimeout(() => {
                isProcessing = false;
            }, 300);
        };
    };

    reader.readAsDataURL(file);
});


// OPTIONAL: cancel just closes modal (if you still use it)
if (cancelCrop) {
    cancelCrop.addEventListener('click', () => {
        cropModal.classList.add('hidden');
    });
}


// load saved photo
window.addEventListener('DOMContentLoaded', () => {
    const saved = localStorage.getItem('profilePhoto');
    if (saved) {
        profilePhoto.src = saved;
    }
});

window.addEventListener("DOMContentLoaded", () => {

  // Floating particles
  const bg = document.getElementById('floating-bg');
  const colors = ['#6b2cd8','#9b59b6','#8e44ad'];
  function particle() {
    const p = document.createElement('div');
    p.className = 'particle';
    const s = Math.random()*20+10;
    p.style.width = s+'px';
    p.style.height = s+'px';
    p.style.left = Math.random()*100+'vw';
    p.style.background = `radial-gradient(circle, ${colors[Math.floor(Math.random()*3)]}, transparent)`;
    p.style.animationDuration = (Math.random()*20+10)+'s';
    bg.appendChild(p);
    setTimeout(()=>p.remove(),30000);
  }
  setInterval(particle,800);

  const methods = document.querySelectorAll(".payment-method");
const inputs = document.querySelectorAll(".payment-method input");

let preference = "";

        function logout() {
            window.location.href = "https://membership-signup.avalonflow.site/sign-in";
        }

        // Show option 1 notification only
        window.addEventListener("load", () => {
            const notification = document.getElementById("planNotification");
            notification.textContent = "Provide your payout details";
            setTimeout(()=>notification.classList.add("show"),300);
            setTimeout(()=>notification.classList.remove("show"),3300);
        });
                    

/* --------------------------
LOAD SAVED DATA
-------------------------- */

const saved = JSON.parse(localStorage.getItem("section3Data") || "{}");

if(saved.preference){

methods.forEach(method=>{

if(method.dataset.method === saved.preference){

method.classList.add("active");

const input = method.querySelector("input");
if(input) input.style.display = "block";

preference = saved.preference;

}

});

}

if(saved.acuAccount) document.getElementById("acuAccount").value = saved.acuAccount;
if(saved.paypal) document.getElementById("paypalInput").value = saved.paypal;
if(saved.cashapp) document.getElementById("cashInput").value = saved.cashapp;
if(saved.venmo) document.getElementById("venmoInput").value = saved.venmo;


/* --------------------------
CARD SELECTION
-------------------------- */

methods.forEach(method => {

const input = method.querySelector("input");

method.onclick = () => {

methods.forEach(m=>{
m.classList.remove("active");
m.querySelector("input").style.display = "none";
});

method.classList.add("active");
input.style.display = "block";

preference = method.dataset.method;

saveData();

};

});


/* --------------------------
AUTO SAVE INPUT
-------------------------- */

inputs.forEach(input=>{

input.addEventListener("input", saveData);

});


function saveData(){

const data = {
preference,
acuAccount: document.getElementById("acuAccount")?.value.trim(),
paypal: document.getElementById("paypalInput")?.value.trim(),
cashapp: document.getElementById("cashInput")?.value.trim(),
venmo: document.getElementById("venmoInput")?.value.trim()
};
