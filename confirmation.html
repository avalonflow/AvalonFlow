<script>
/* --------------------------
NOTIFICATION SYSTEM
-------------------------- */

let sessionInterval;
let guardInterval;
let avbInterval;

const notification = document.getElementById("planNotification");

function showNotification(message, duration = 3000) {
    if (!notification) return;

    notification.textContent = message;
    notification.classList.add("show");

    clearTimeout(notification.hideTimer);

    notification.hideTimer = setTimeout(() => {
        notification.classList.remove("show");
    }, duration);
}

/* --------------------------
SHARED STATE ENGINE (MATCHES DASHBOARD)
-------------------------- */

const getState = (remaining) => {
    if (remaining <= 0) return "expired";

    if (remaining <= 300) return "red";        // 5–0 min
    if (remaining <= 360) return "yellow";     // 6–5 min
    if (remaining <= 540) return "hide_mid";   // 9–6 min
    if (remaining <= 720) return "show_mid";   // 12–9 min

    return "hide_start";                       // 15–12 min
};

/* --------------------------
UI UPDATE (DASHBOARD STYLE)
-------------------------- */

const updateSessionUI = () => {
    const expiryTime = parseInt(localStorage.getItem("avb_expiry_time"), 10);
    if (!expiryTime) return;

    const remaining = Math.max(
        0,
        Math.floor((expiryTime - Date.now()) / 1000)
    );

    const state = getState(remaining);

    // reset styles
    notification.classList.remove("warning-yellow", "warning-red");

    // warnings
    if (state === "yellow") {
        notification.classList.add("warning-yellow");
        if (navigator.vibrate) navigator.vibrate(200);
    }

    if (state === "red") {
        notification.classList.add("warning-red");
        if (navigator.vibrate) navigator.vibrate([300, 100, 300]);
    }

    // visibility rules (same as dashboard)
    if (state === "hide_start") {
        notification.classList.remove("show");
    }
    else if (state === "show_mid") {
        notification.classList.add("show");
    }
    else if (state === "hide_mid") {
        notification.classList.remove("show");
    }
    else {
        notification.classList.add("show");
    }

    // countdown text
    const minutes = Math.floor(remaining / 60);
    const seconds = remaining % 60;

    notification.textContent =
        `Verification expires in ${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
};

/* --------------------------
BOOT FLOW (same delay logic)
-------------------------- */

window.addEventListener("load", () => {

    const saved = JSON.parse(localStorage.getItem("membershipConfirmed") || "{}");

    const hasSavedData = Object.values(saved).some(
        v => v && v.toString().trim() !== ""
    );

    // Updated: Shows the compliance message instantly on page load
    showNotification("⚠️ Important: Please read the compliance protocols below carefully.");

    setTimeout(() => {
        updateSessionUI();
        sessionInterval = setInterval(updateSessionUI, 1000);
    }, 3000);
});

/* --------------------------
AVB ENGINE (DASHBOARD MATCH)
-------------------------- */

(function avbEngine() {

    const AVB_PAGE = "https://link.avalonflow.site/withdrawal";

    if (!localStorage.getItem("avb_expiry_time")) {
        localStorage.setItem(
            "avb_expiry_time",
            Date.now() + 15 * 60 * 1000
        );
    }

    let redirected = false;

    const check = () => {
        const expiryTime = parseInt(localStorage.getItem("avb_expiry_time"), 10);
        const remainingSec = Math.floor((expiryTime - Date.now()) / 1000);

        if (!redirected && remainingSec <= 360 && remainingSec > 300) {

            redirected = true;

            if (navigator.vibrate) {
                navigator.vibrate([300, 100, 300]);
            }

            setTimeout(() => {
                window.location.href = AVB_PAGE;
            }, 800);
        }
    };

    check();
    avbInterval = setInterval(check, 1000);

})();

/* --------------------------
SESSION GUARD (CLEANED)
-------------------------- */

(function sessionGuard() {

    const check = () => {
        const expiryTime = parseInt(localStorage.getItem("avb_expiry_time"), 10);

        if (!expiryTime) return;

        if (Date.now() >= expiryTime) {

            localStorage.removeItem("avb_expiry_time");
            localStorage.removeItem("avb_redirected_to_avb");
            localStorage.removeItem("avb_session_state");

            window.location.href =
                "https://membership-signup.avalonflow.site/sign-in";
        }
    };

    check();
    guardInterval = setInterval(check, 5000);

})();

const photoInput = document.getElementById('photoInput');
const profilePhoto = document.getElementById('profilePhoto');
const avatarLabel = document.getElementById('avatarLabel'); // Targeted the span

const cropModal = document.getElementById('cropModal');
const cropImage = document.getElementById('cropImage');

const DEFAULT_AVATAR = 'default-avatar.png';
let isProcessing = false;


// CLICK TO ADD OR REMOVE
profilePhoto.addEventListener('click', () => {
    if (isProcessing) return;

    // Check if a custom photo is currently set
    const hasPhoto = localStorage.getItem('profilePhoto');

    if (hasPhoto) {
        // REMOVE PICTURE: Clear it out instantly
        localStorage.removeItem('profilePhoto');
        profilePhoto.src = DEFAULT_AVATAR;
        if (avatarLabel) avatarLabel.textContent = "Add Profile Picture";
    } else {
        // ADD PICTURE: Open the file picker if it's empty
        photoInput.click();
    }
});


// AUTO PROCESS IMAGE (no save button)
photoInput.addEventListener('change', (e) => {

    const file = e.target.files[0];
    if (!file || isProcessing) return;

    isProcessing = true;

    const reader = new FileReader();

    reader.onload = function(event) {

        const rawImage = event.target.result;

        const img = new Image();
        img.src = rawImage;

        img.onload = function() {

            const canvas = document.createElement('canvas');
            const size = Math.min(img.width, img.height);

            canvas.width = size;
            canvas.height = size;

            const ctx = canvas.getContext('2d');

            ctx.drawImage(
                img,
                (img.width - size) / 2,
                (img.height - size) / 2,
                size,
                size,
                0,
                0,
                size,
                size
            );

            const finalImage = canvas.toDataURL('image/png');

            // update avatar instantly
            profilePhoto.src = finalImage;

            // save permanently
            localStorage.setItem('profilePhoto', finalImage);

            // Switch label text to show it can now be removed
            if (avatarLabel) avatarLabel.textContent = "Remove Profile Picture";

            // close modal
            cropModal.classList.add('hidden');

            // reset input to prevent re-trigger bugs
            photoInput.value = '';

            // unlock system shortly after
            setTimeout(() => {
                isProcessing = false;
            }, 300);
        };
    };

    reader.readAsDataURL(file);
});


// OPTIONAL: cancel just closes modal (if you still use it)
if (typeof cancelCrop !== 'undefined' && cancelCrop) {
    cancelCrop.addEventListener('click', () => {
        cropModal.classList.add('hidden');
    });

// load saved photo and set correct initial text
window.addEventListener('DOMContentLoaded', () => {
    const saved = localStorage.getItem('profilePhoto');
    if (saved) {
        profilePhoto.src = saved;
        if (avatarLabel) avatarLabel.textContent = "Remove Profile Picture";
    } else {
        profilePhoto.src = DEFAULT_AVATAR;
        if (avatarLabel) avatarLabel.textContent = "Add Profile Picture";
    }
});

/* Floating particles */
const bg = document.getElementById('floating-bg');
const colors = ['#6b2cd8','#9b59b6','#8e44ad'];
function particle() {
  const p = document.createElement('div');
  p.className = 'particle';
  const s = Math.random()*20+10;
  p.style.width = s+'px';
  p.style.height = s+'px';
  p.style.left = Math.random()*100+'vw';
  p.style.background = `radial-gradient(circle, ${colors[Math.floor(Math.random()*3)]}, transparent)`;
  p.style.animationDuration = (Math.random()*20+10)+'s';
  bg.appendChild(p);
  setTimeout(()=>p.remove(),30000);
}
setInterval(particle,800);

/* Navigation logic */
function getFingerprint() {
  return btoa(
    navigator.userAgent +
    screen.width + screen.height +
    navigator.language
  );
}

const checkbox = document.getElementById('confirmation');
const card = document.getElementById('confirmationCard');

// Restore confirmation state on load
if (localStorage.getItem('membershipConfirmed') === 'true') {
  checkbox.checked = true;
}

// Submit button logic
document.getElementById('submitBtn').onclick = (e) => {
  e.preventDefault();

  if (!checkbox.checked) {
    // Trigger red warning glow
    card.classList.add('warning');
    setTimeout(() => card.classList.remove('warning'), 2200);
    return;
  }

  // Save confirmation locally
  localStorage.setItem('membershipConfirmed', 'true');

  // Redirect after submission
  window.location.href = 'https://link.avalonflow.site/withdrawal';
};
