    <style>
        /* ---------- Base ---------- */

body{
font-family: Inter, system-ui, sans-serif;
margin:0;
background:#06070c;
color:white;
overflow-x:hidden;
}

html, body {
    height: 100%;
}

/* ---------- Cyber Grid Background ---------- */

body::before{
content:"";
position:fixed;
inset:0;
background:
linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
background-size:40px 40px;
z-index:-1;
}

/* Aurora Glow */

body::after{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 20%, rgba(107,44,216,0.25), transparent 40%),
radial-gradient(circle at 80% 60%, rgba(0,255,255,0.15), transparent 40%);
z-index:-1;
}

        /* ---------- Sidebar ---------- */
        #sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 280px;
            height: 100%;
            background: rgba(15, 15, 25, 0.95);
            backdrop-filter: blur(14px);
            z-index: 5;
            padding: 25px;
            transform: translateX(-100%);
            transition: transform 0.3s ease;
        }
        #sidebar.open { transform: translateX(0); }
        #sidebar h2{
font-size:22px;
margin-bottom:20px;
color:#a78bfa;
}
        #sidebar button {
            width: 100%;
            margin: 12px 0;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 16px;
        }

/* ---------- Menu Button ---------- */

        /* ---------- Menu Button ---------- */
        #menuBtn {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 6;
            background: #6b2cd8;
            border: none;
            color: #fff;
            padding: 12px 14px;
            border-radius: 10px;
}

/* move button when sidebar opens */
#menuBtn.shift{
left:300px;
}

/* ---------- Content Grid ---------- */

#content {
    position: relative;
    z-index: 1;

    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    align-items: stretch;
    gap: 28px;

    max-width: 1400px;
    margin: auto;

    padding: 100px 40px 120px 40px; /* extra bottom padding for footer */
    min-height: 100vh; /* ensures content fills the screen even if short */
}

/* ---------- Glass Cards ---------- */

.panel .glass-card{
background:rgba(255,255,255,0.04);
backdrop-filter:blur(14px);
border-radius:18px;
padding:28px;
border:1px solid rgba(255,255,255,0.05);
}

.panel h3 {
color:#6b2cd8;
margin-top:0;
}

box-shadow:
0 10px 30px rgba(0,0,0,0.6),
inset 0 0 30px rgba(255,255,255,0.03);

transition:0.35s;
position:relative;
overflow:hidden;
}

.glass-card:hover{
transform:translateY(-6px);
box-shadow:
0 20px 60px rgba(107,44,216,0.45);
}

/* ---------- Neon Border Effect ---------- */

.glass-card::before{
content:"";
position:absolute;
inset:0;
border-radius:18px;
padding:1px;
background:linear-gradient(120deg,#6b2cd8,#00f2fe,#6b2cd8);
-webkit-mask:
linear-gradient(#000 0 0) content-box,
linear-gradient(#000 0 0);
-webkit-mask-composite:xor;
opacity:0.25;
}

/* ---------- Hero Metric ---------- */

.metric-card{
grid-column:span 2;
text-align:center;
}

.metric-card h2{
font-size:16px;
color:#aaa;
}

#totalACU{
font-size:52px;
font-weight:700;
color:#00f2fe;
text-shadow:0 0 25px rgba(0,242,254,0.8);
}

/* ---------- Small Stat Cards ---------- */

.stat{
font-size:28px;
font-weight:600;
color:#a78bfa;
}

/* ---------- Buttons ---------- */

.button{
display:inline-block;
background:linear-gradient(90deg,#6b2cd8,#00f2fe);
border:none;
border-radius:10px;
padding:12px 20px;
color:white;
font-weight:600;
}

        /* ---------- Floating Background ---------- */
        #floating-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background: radial-gradient(circle at bottom, #1a0d3a, #0d0d0d);
            overflow: hidden;
        }
        .particle {
            position: absolute;
            border-radius: 50%;
            opacity: 0.6;
            animation: floatParticles linear infinite;
            box-shadow: 0 0 10px #6b2cd8, 0 0 20px #6b2cd8;
        }
        @keyframes floatParticles {
            0% { transform: translateY(100vh) scale(0.3); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }

        /* ---------------- PROGRESS BAR ---------------- */
.progress-bar {
    width: 100%;
    height: 18px;
    background: rgba(255,255,255,0.06);
    border-radius: 12px;
    overflow: hidden;
    margin: 18px 0;
}

.progress-fill {
    height: 100%;
    width: 0%;
    border-radius: 12px;
    position: relative;
    transition: width 0.6s ease;
        background: linear-gradient(90deg,#4facfe,#00f2fe);
    box-shadow: 0 0 20px rgba(79,172,254,0.6);
}

/* Energy flow */
.progress-fill::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
    animation: energyFlow 2.5s linear infinite;
}

@keyframes energyFlow {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
}

        /* ---------- Footer ---------- */
        footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            text-align: center;
            padding: 18px 0;
            font-size: 14px;
            color: #aaa;
            background: rgba(15,15,25,0.95);
            backdrop-filter: blur(12px);
            box-shadow: 0 -5px 20px rgba(0,0,0,0.4);
            z-index: 6;
        }

                /* ---------- Notification Bar (Dashboard style) ---------- */
        .notification-bar {
            position: fixed;
            top: -80px;
            right: 20px;
            background: rgba(30, 144, 255, 0.25);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(30,144,255,0.4);
            color: #fff;
            padding: 12px 18px;
            border-radius: 12px;
            font-size: 14px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.25);
            transition: top 0.5s ease, opacity 0.5s ease;
            z-index: 9999;
            opacity: 0;
            max-width: 350px;
            white-space: normal;
            overflow: hidden;
        }
        .notification-bar.show {
            top: 20px;
            opacity: 1;
        }
        .notification-bar::before {
            content: '';
            position: absolute;
            left: -50%;
            top: 0;
            width: 50%;
            height: 100%;
            background: rgba(255,255,255,0.3);
            transform: skewX(-25deg);
            animation: liquidWave 2s linear infinite;
        }
        @keyframes liquidWave {
            0% { left: -50%; }
            100% { left: 100%; }
        }

@media (max-width:768px){
    #content {
        padding: 100px 18px 140px 18px; /* extra space for mobile */
    }
}

.metric-card{
grid-column:span 2;
}

@media (max-width:900px){
.metric-card{
grid-column:span 1;
}
}

#totalACU{
font-size:38px;
}
    </style>
</head>

    <script>
        /* Floating particles */
        const bg = document.getElementById('floating-bg');
        const colors = ['#6b2cd8','#9b59b6','#8e44ad'];
        function particle() {
            const p = document.createElement('div');
            p.className = 'particle';
            const s = Math.random()*20+10;
            p.style.width = s+'px';
            p.style.height = s+'px';
            p.style.left = Math.random()*100+'vw';
            p.style.background = `radial-gradient(circle, ${colors[Math.floor(Math.random()*3)]}, transparent)`;
            p.style.animationDuration = (Math.random()*20+10)+'s';
            bg.appendChild(p);
            setTimeout(()=>p.remove(),30000);
        }
        setInterval(particle,800);

        /* Sidebar toggle */
        const sidebar = document.getElementById('sidebar');
const content = document.getElementById('content');

const menuBtn = document.getElementById('menuBtn');

function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const menuBtn = document.getElementById('menuBtn');

    sidebar.classList.toggle('open');
    menuBtn.classList.toggle('shift');
}

function navigateTo(page){
    window.location.href = page;
}
        function logout(){
            localStorage.removeItem("avalon_logged_in");
            localStorage.removeItem("avalon_seen_dashboard");
            window.location.href = 'https://profile-login.avalonflow.site';
        }

        // Branch data - must be before any logic
const plans = {
    premium: { per12h: 298.29 },
    basic:   { per12h: 183.29 },
    lite:    { per12h: 118.29 }
};

const ALL_PLANS = ['premium','basic','lite'];

// ---------- Load State ----------
let unlockedPlans = JSON.parse(localStorage.getItem('unlockedPlans')) || {};
let unlockTimes = JSON.parse(localStorage.getItem('unlockTimes')) || {};

// Track displayed AC for smooth per-plan animation
let displayedAC = { premium: 0, basic: 0, lite: 0 };

// ---------- Trial Setup ----------
const userId = localStorage.getItem("userId");
const TRIAL_KEY = 'trialStart_' + userId;
const TRIAL_MS = 7 * 24 * 60 * 60 * 1000; // 7 days
const trialStart = parseInt(localStorage.getItem(TRIAL_KEY)) || 0;
const trialActive = trialStart && (Date.now() - trialStart < TRIAL_MS);

// ---------- Pulse Animation ----------
function animateTotalChange() {
    const el = document.getElementById('totalACU');
    el.classList.add('value-pulse');
    setTimeout(() => el.classList.remove('value-pulse'), 400);
}

// ---------- Dashboard Progress Bar ----------
const progressFill = document.getElementById("progressFill");
const fillDuration = 12 * 60 * 60 * 1000; // 12 hours

function updateDashboardProgress() {
    const now = Date.now();

    // Use "premium" as reference plan for dashboard progress
    const planKey = "premium";
    const startTime = unlockTimes[planKey] || (trialActive ? trialStart : now);
    const elapsed = now - startTime;

    const cycleElapsed = elapsed % fillDuration;
    const timeProgress = (cycleElapsed / fillDuration) * 100;

    progressFill.style.width = timeProgress + "%";
}

// Update progress every second
setInterval(updateDashboardProgress, 1000);
updateDashboardProgress(); // run once immediately

// ---------- Read Activated Credits (with 12-hour cycle growth) ----------
function readActivatedCredits() {
    const now = Date.now();
    const cycleMs = 12 * 60 * 60 * 1000; // 12 hours

    ALL_PLANS.forEach(plan => {
        if (unlockedPlans[plan] || trialActive) {
            const key = plan + 'AC';
            const stored = parseFloat(localStorage.getItem(key)) || 0;

            // Determine start time: use unlockTimes or trial start for trial users
            const startTime = unlockTimes[plan] || (trialActive ? trialStart : now);
            const elapsed = now - startTime;

            // 12-hour cycle growth
            const cycles = Math.floor(elapsed / cycleMs);
            const cycleProgress = (elapsed % cycleMs) / cycleMs;
            const targetAC = cycles * plans[plan].per12h + cycleProgress * plans[plan].per12h;

            // Smoothly animate displayedAC toward either stored value or calculated growth
            const target = Math.max(stored, targetAC);
            const diff = target - displayedAC[plan];
            displayedAC[plan] += diff * 0.08;

            // Update per-plan element if exists
            const el = document.getElementById(key);
            if (el) {
                const newValue = displayedAC[plan].toFixed(2) + ' ACU';
                if (el.textContent !== newValue) {
                    el.classList.add('value-pulse');
                    setTimeout(() => el.classList.remove('value-pulse'), 400);
                    el.textContent = newValue;
                }
            }
        }
    });
}

// ---------- Update Total ACU (instant from localStorage) ----------
function updateTotalACU() {
    const total = ALL_PLANS.reduce((sum, plan) => {
        const stored = parseFloat(localStorage.getItem(plan + 'AC')) || 0;
        const startTime = unlockTimes[plan] || (trialActive ? trialStart : Date.now());
        const elapsed = Date.now() - startTime;
        const cycleMs = 12 * 60 * 60 * 1000;
        const cycles = Math.floor(elapsed / cycleMs);
        const cycleProgress = (elapsed % cycleMs) / cycleMs;
        const growthAC = cycles * plans[plan].per12h + cycleProgress * plans[plan].per12h;

        const value = Math.max(stored, growthAC);
        return (unlockedPlans[plan] || trialActive) ? sum + value : sum;
    }, 0);

    const el = document.getElementById('totalACU');
    const prevValue = parseFloat(el.textContent) || 0;

    if (total.toFixed(2) !== prevValue.toFixed(2)) animateTotalChange();

    el.textContent = total.toFixed(2) + ' ACU';
    localStorage.setItem('totalACU', total.toFixed(2));
}

// ---------- Main Update ----------
function updateACU() {
    readActivatedCredits();
    updateTotalACU();
}

// ---------- Animation Loop ----------
function animate() {
    updateACU();
    requestAnimationFrame(animate);
}

// ---------- Start Animation ----------
animate();

// ---------- Auto-refresh in case localStorage changes externally ----------
setInterval(updateACU, 30000); // every 30 seconds

        /* Dashboard Notification */
        window.addEventListener("load", () => {
            const notification = document.getElementById("dashboardNotification");

            localStorage.setItem("avalon_logged_in","true");

            let message;
            if(!localStorage.getItem("avalon_seen_dashboard")){
                message = "Hi there — signed in successfully.";
                localStorage.setItem("avalon_seen_dashboard","true");
            } else {
                message = "Hi there — welcome back.";
            }

            notification.textContent = message;
            setTimeout(()=>notification.classList.add("show"), 300);
            setTimeout(()=>notification.classList.remove("show"), 3300);
        });

        /* ---------- Auto-Logout After 8 Hours of Inactivity ---------- */
        const AUTO_LOGOUT_TIME = 8 * 60 * 60 * 1000; // 8 hours in ms
        let logoutTimer = setTimeout(logout, AUTO_LOGOUT_TIME);

        function resetLogoutTimer(){
            clearTimeout(logoutTimer);
            logoutTimer = setTimeout(logout, AUTO_LOGOUT_TIME);
        }

        ["mousemove","keydown","scroll","click"].forEach(event => {
            window.addEventListener(event, resetLogoutTimer);
        });
</script>
